services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steadyleads-api
    environment:
      - DB_HOST=postgres-db-postgres-1
      - DB_PORT=5432
      - DB_NAME=openclaw
      - DB_USER=postgres_admin
      - DB_PASSWORD=change_me_strong
      - NODE_ENV=production
      - API_PORT=3000
      - JWT_SECRET=dev-secret-key-change-in-prod
      - HCAPTCHA_SITE_KEY=${HCAPTCHA_SITE_KEY}
      - HCAPTCHA_SECRET_KEY=${HCAPTCHA_SECRET_KEY}
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - openclaw-sluh_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - traefik.enable=true
      - traefik.http.routers.steadyleads-api.entrypoints=web,websecure
      - "traefik.http.routers.steadyleads-api.rule=Host(`steadyleads.co`) && PathPrefix(`/api`)"
      - traefik.http.routers.steadyleads-api.priority=10
      - traefik.http.routers.steadyleads-api.tls.certresolver=letsencrypt
      - traefik.http.routers.steadyleads-api.service=steadyleads-api-service
      - traefik.http.services.steadyleads-api-service.loadbalancer.server.port=3000

networks:
  openclaw-sluh_default:
    external: true
