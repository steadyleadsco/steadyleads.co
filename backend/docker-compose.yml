version: '3.9'

services:
  # Express.js Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steadyleads-api
    environment:
      # Database (from VPS host environment variables)
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-openclaw}
      - DB_USER=${DB_USER:-openclaw_dba}
      - DB_PASSWORD=${DB_PASSWORD}
      # API Configuration
      - NODE_ENV=production
      - API_PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      # GitHub (if needed for API integrations)
      - GITHUB_API_TOKEN=${GITHUB_API_TOKEN}
      # Telegram (if needed for API integrations)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    ports:
      - "3000:3000"
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - traefik-network
      - steadyleads-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Traefik routing for /api paths
      - "traefik.enable=true"
      - "traefik.http.routers.steadyleads-api.entrypoints=web,websecure"
      - "traefik.http.routers.steadyleads-api.rule=Host(`steadyleads.co`) && PathPrefix(`/api`)"
      - "traefik.http.routers.steadyleads-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.steadyleads-api.service=steadyleads-api-service"
      - "traefik.http.middlewares.steadyleads-api-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.steadyleads-api.middlewares=steadyleads-api-stripprefix"
      - "traefik.http.services.steadyleads-api-service.loadbalancer.server.port=3000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres-check
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Next.js Frontend (placeholder for future)
  # Uncomment when frontend is ready
  # frontend:
