  #   labels:
  #     # Traefik routing for root path
  #     - "traefik.enable=true"
  #     - "traefik.http.routers.steadyleads-web.entrypoints=web,websecure"
  #     - "traefik.http.routers.steadyleads-web.rule=Host(`steadyleads.co`)"
  #     - "traefik.http.routers.steadyleads-web.tls.certresolver=letsencrypt"
  #     - "traefik.http.routers.steadyleads-web.service=steadyleads-web-service"
  #     - "traefik.http.services.steadyleads-web-service.loadbalancer.server.port=3001"
