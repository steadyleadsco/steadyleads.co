  #       max-file: "3"

  # PostgreSQL Health Check (connects to external postgres)
  postgres-check:
    image: postgres:15-alpine
    container_name: steadyleads-db-check
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    command: >
      sh -c 'until pg_isready -h ${DB_HOST:-postgres} -p ${DB_PORT:-5432} -U ${DB_USER:-openclaw_dba} -d ${DB_NAME:-openclaw}; do sleep 2; done && echo "Database ready"'
    networks:
      - traefik-network
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

networks:
  # Connect to existing Traefik network
  traefik-network:
    name: traefik-network
    external: true
  
  # Internal network for inter-service communication
  steadyleads-network:
    name: steadyleads-network
    driver: bridge

volumes:
  logs:
    driver: local
